<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — RadiatePro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { background-color: #0a0a0a; color: #f0f0f0; margin: 0; font-family: system-ui, sans-serif; }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 240px; background: #111; border-right: 1px solid #2a2a2a;
      display: flex; flex-direction: column; z-index: 200;
      overflow-y: auto;
    }
    .sidebar-brand {
      padding: 1.5rem 1.25rem 1rem;
      font-size: 1.2rem; font-weight: 800; color: #E3FC02;
      letter-spacing: -.01em; border-bottom: 1px solid #2a2a2a;
      cursor: pointer; text-decoration: none; display: block;
    }
    .sidebar-user {
      padding: 1.1rem 1.25rem;
      border-bottom: 1px solid #2a2a2a;
      display: flex; align-items: center; gap: .75rem;
    }
    .avatar-sm {
      width: 38px; height: 38px; border-radius: 50%;
      background: #E3FC02; color: #000;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; flex-shrink: 0;
    }
    .sidebar-username { font-weight: 600; font-size: .9rem; line-height: 1.2; }
    .sidebar-studio   { font-size: .75rem; color: #ccc; }
    .sidebar-nav { flex: 1; padding: .75rem 0; }
    .nav-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem 1.25rem; color: #888; font-size: .9rem;
      cursor: pointer; border: none; background: none; width: 100%;
      text-align: left; text-decoration: none; border-left: 3px solid transparent;
      transition: background .15s, color .15s;
    }
    .nav-item:hover { background: rgba(227,252,2,.07); color: #f0f0f0; }
    .nav-item.active { color: #E3FC02; background: rgba(227,252,2,.1); border-left-color: #E3FC02; font-weight: 600; }
    .nav-item .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
    .sidebar-footer { padding: .75rem 1.25rem 1.25rem; border-top: 1px solid #2a2a2a; }
    .sidebar-footer button {
      background: #1a1a1a; border: 1px solid #2e2e2e; color: #bbb;
      padding: .4rem .9rem; border-radius: 6px; font-size: .85rem;
      cursor: pointer; width: 100%; text-align: left;
      transition: background .15s, color .15s, border-color .15s;
    }
    .sidebar-footer button:hover { background: rgba(227,252,2,.08); color: #E3FC02; border-color: #E3FC02; }

    /* ── Main content ── */
    .main-wrap { margin-left: 240px; min-height: 100vh; }
    .topbar {
      display: none;
      background: #111; border-bottom: 1px solid #2a2a2a;
      padding: .75rem 1rem; align-items: center; gap: .75rem;
    }
    .topbar-brand { color: #E3FC02; font-weight: 800; font-size: 1.1rem; flex: 1; }
    .content { padding: 2rem; max-width: 780px; }

    /* ── Events ── */
    .btn-accent { background-color: #E3FC02; color: #000; font-weight: 700; border: none; }
    .btn-accent:hover { background-color: #cce500; color: #000; }
    .page-title { color: #E3FC02; }
    #spinner { color: #E3FC02; }
    .event-card {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
      transition: border-color .2s;
    }
    .event-card:hover { border-color: #444; }
    .event-card.registered { border-color: #198754; }
    .event-date-badge {
      background: #E3FC02; color: #000;
      border-radius: 8px; padding: .4rem .75rem;
      font-weight: 700; font-size: .85rem; white-space: nowrap; min-width: 90px; text-align: center;
    }
    .event-title { color: #f0f0f0; font-weight: 700; font-size: 1.1rem; }
    .event-meta { color: #999; font-size: .85rem; }
    .text-muted { color: #999 !important; }
    .badge-convention  { background: #0d6efd; color: #fff; font-size: .75rem; }
    .badge-competition { background: #fd7e14; color: #000; font-size: .75rem; }
    .reg-badge {
      background: #198754; color: #fff; font-size: .72rem; font-weight: 600;
      padding: .25rem .6rem; border-radius: 20px; white-space: nowrap;
    }
    .cap-bar-wrap   { background:#2a2a2a; border-radius:6px; height:9px; overflow:hidden; }
    .cap-bar        { height:100%; border-radius:6px; transition:width .3s; }
    .cap-label      { font-size:.68rem; color:#888; margin-bottom:.3rem; display:flex; justify-content:space-between; align-items:center; }
    .cap-label.full-lbl { color:#ff5555; font-weight:700; }
    .event-card.full { border-color: #5a1010 !important; }
    /* Modal */
    .modal-content { background: #1a1a1a; border: 1px solid #2a2a2a; color: #f0f0f0; }
    .modal-header { border-bottom-color: #2a2a2a; }
    .modal-footer { border-top-color: #2a2a2a; }
    .modal-title { color: #E3FC02; }
    .btn-close { filter: invert(1); }
    /* Student registration table */
    .stu-table { --bs-table-bg: transparent; --bs-table-color: #ccc; --bs-table-border-color: #2a2a2a; font-size: .875rem; }
    .stu-table thead th { color: #aaa; font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; border-bottom-color: #2a2a2a; }
    .stu-table tbody tr { cursor: pointer; transition: background .12s; }
    .stu-table tbody tr:hover { background: #1e1e1e; }
    /* Toggle switch accent */
    .form-check-input.stu-switch { background-color: #333; border-color: #555; cursor: pointer; }
    .form-check-input.stu-switch:checked { background-color: #E3FC02; border-color: #E3FC02; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='%23000'/%3e%3c/svg%3e"); }
    .form-check-input.stu-switch:focus { box-shadow: 0 0 0 .2rem rgba(227,252,2,.25); border-color: #E3FC02; }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      .sidebar { transform: translateX(-100%); transition: transform .25s; }
      .sidebar.open { transform: translateX(0); }
      .main-wrap { margin-left: 0; }
      .topbar { display: flex; }
      .content { padding: 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- ── Sidebar ── -->
  <nav class="sidebar" id="sidebar">
    <a href="login.html" class="sidebar-brand">RadiatePro</a>

    <div class="sidebar-user">
      <div class="avatar-sm" id="sidebarAvatar">?</div>
      <div>
        <div class="sidebar-username" id="sidebarName">Loading…</div>
        <div class="sidebar-studio"   id="sidebarStudio"></div>
      </div>
    </div>

    <div class="sidebar-nav">
      <a class="nav-item" href="dashboard.html">
        <span class="nav-icon">&#127968;</span> Home
      </a>
      <a class="nav-item" href="dashboard.html#profile">
        <span class="nav-icon">&#128100;</span> My Profile
      </a>
      <a class="nav-item" href="dashboard.html#students">
        <span class="nav-icon">&#127891;</span> My Students
      </a>
      <a class="nav-item active" href="events.html">
        <span class="nav-icon">&#128197;</span> Events
      </a>
      <a class="nav-item" href="admin.html" id="adminLink" style="display:none;">
        <span class="nav-icon">&#9881;</span> Admin Portal
      </a>
    </div>

    <div class="sidebar-footer">
      <button onclick="logout()">&#x2192; Sign Out</button>
    </div>
  </nav>

  <!-- ── Main wrap ── -->
  <div class="main-wrap">

    <!-- Mobile topbar -->
    <div class="topbar" id="topbar">
      <button style="background:none;border:none;color:#E3FC02;font-size:1.4rem;padding:0;" onclick="toggleSidebar()">&#9776;</button>
      <span class="topbar-brand">RadiatePro</span>
    </div>

    <div class="content">
      <h4 class="fw-bold page-title mb-4">Events</h4>
      <div id="spinner" class="text-center py-5">
        <div class="spinner-border" role="status"><span class="visually-hidden">Loading…</span></div>
      </div>
      <div id="emptyMsg" class="text-muted text-center py-5 d-none">No events at this time.</div>
      <div id="errorMsg" class="alert alert-danger d-none"></div>
      <div id="eventsList"></div>
    </div>
  </div>

  <!-- Mobile sidebar overlay -->
  <div id="sidebarOverlay" onclick="toggleSidebar()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;"></div>

  <!-- Registration Modal -->
  <div class="modal fade" id="regModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="regModalTitle">Register for Event</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" style="padding-bottom:.5rem;">
          <div id="regAlert" class="alert alert-danger d-none mb-3"></div>
          <input type="hidden" id="regEventId">

          <!-- Student table -->
          <div id="studentTableWrap" class="d-none">
            <table class="table table-sm stu-table mb-0">
              <thead>
                <tr>
                  <th style="width:56px;">Attending</th>
                  <th>Name</th>
                  <th>Date of Birth</th>
                  <th>Gender</th>
                </tr>
              </thead>
              <tbody id="studentTableBody"></tbody>
            </table>
          </div>

          <p id="noStudentsMsg" class="text-muted small mb-0 d-none">
            No students added yet. Add one below to register.
          </p>

          <!-- Quick add student -->
          <div class="mt-3 pt-3" style="border-top:1px solid #2a2a2a;">
            <button class="btn btn-outline-secondary btn-sm" style="font-size:.8rem;" type="button"
              onclick="toggleAddStudentForm()">+ Add New Student</button>
            <div id="quickAddStudentForm" class="mt-2 d-none">
              <div id="quickAddAlert" class="alert alert-danger d-none mb-2" style="font-size:.8rem;padding:.4rem .75rem;"></div>
              <div class="d-flex gap-2 flex-wrap align-items-end">
                <div>
                  <label class="form-label mb-1" style="font-size:.75rem;color:#aaa;">Name *</label>
                  <input type="text" id="qsName" class="form-control form-control-sm" placeholder="Full name"
                    style="background:#111;border-color:#333;color:#f0f0f0;width:180px;">
                </div>
                <div>
                  <label class="form-label mb-1" style="font-size:.75rem;color:#aaa;">Date of Birth</label>
                  <input type="date" id="qsDob" class="form-control form-control-sm"
                    style="background:#111;border-color:#333;color:#f0f0f0;width:150px;">
                </div>
                <div>
                  <label class="form-label mb-1" style="font-size:.75rem;color:#aaa;">Gender</label>
                  <select id="qsGender" class="form-select form-select-sm"
                    style="background:#111;border-color:#333;color:#f0f0f0;width:140px;">
                    <option value="">— Select —</option>
                    <option value="Female">Female</option>
                    <option value="Male">Male</option>
                    <option value="Non-binary">Non-binary</option>
                    <option value="Prefer not to say">Prefer not to say</option>
                  </select>
                </div>
                <button class="btn btn-accent btn-sm" id="qsSaveBtn" onclick="quickSaveStudent()"
                  style="height:31px;">Add</button>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer flex-column align-items-stretch gap-2" style="padding:.75rem 1rem;">
          <div id="regTotal" class="text-center d-none" style="font-size:.9rem;"></div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-danger btn-sm me-auto" id="unregBtn" onclick="unregisterFromEvent()" style="display:none;">
              Cancel Registration
            </button>
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-accent" id="regSaveBtn" onclick="saveRegistration()">Register</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API = 'https://goldfish-app-fuu3t.ondigitalocean.app/radiatepro-backend';
    let myStudents = [];
    let myRegistrations = {}; // event_id (string) → {registration_id, student_ids}
    let eventsCache = {};     // event_id → full event object
    let regModal;
    let currentRegEvent = null; // full event object for the open modal

    function logout() { localStorage.removeItem('token'); window.location.href = 'login.html'; }

    function toggleSidebar() {
      const sb  = document.getElementById('sidebar');
      const ovl = document.getElementById('sidebarOverlay');
      const open = sb.classList.toggle('open');
      ovl.style.display = open ? 'block' : 'none';
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function fmtDate(iso) {
      const d = new Date(iso);
      return {
        short: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
        time:  d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
      };
    }

    function typeBadge(type) {
      if (!type) return '';
      const cls = type === 'competition' ? 'badge-competition' : 'badge-convention';
      return `<span class="badge ${cls} me-2">${type.charAt(0).toUpperCase()+type.slice(1)}</span>`;
    }

    function renderEvents(events) {
      document.getElementById('spinner').classList.add('d-none');
      if (!events.length) { document.getElementById('emptyMsg').classList.remove('d-none'); return; }
      // Build lookup cache
      events.forEach(e => { eventsCache[e.id] = e; });

      const now = new Date();
      const upcoming = events.filter(e => new Date(e.event_date) >= now);
      const past     = events.filter(e => new Date(e.event_date) <  now);

      function renderGroup(label, list) {
        if (!list.length) return '';
        return `
          <h6 class="text-muted text-uppercase small mb-3 mt-4" style="letter-spacing:.08em;">${label}</h6>
          ${list.map(e => {
            const dt  = fmtDate(e.event_date);
            const reg = myRegistrations[String(e.id)];
            const isPast = new Date(e.event_date) < now;
            const isFull = e.max_students && (e.registered_count || 0) >= e.max_students && !reg;
            return `
              <div class="event-card p-4 mb-3 d-flex gap-3 align-items-start ${reg ? 'registered' : ''} ${isFull ? 'full' : ''}" id="ecard-${e.id}">
                <div class="event-date-badge flex-shrink-0">${dt.short}</div>
                <div class="flex-grow-1">
                  <div class="event-title mb-1">${typeBadge(e.event_type)}${esc(e.title)}</div>
                  ${e.description ? `<p class="event-meta mb-2">${esc(e.description)}</p>` : ''}
                  <div class="event-meta d-flex flex-wrap gap-3 mb-2">
                    <span>&#128337; ${dt.time}</span>
                    ${e.location ? `<span>&#128205; ${esc(e.location)}</span>` : ''}
                  </div>
                  ${pricingBadge(e)}
                  <div class="mt-1">${capacityBadge(e)}</div>
                  ${!isPast ? `
                  <div class="d-flex align-items-center gap-2 mt-2">
                    ${reg ? `<span class="reg-badge">&#10003; Registered</span>` : ''}
                    <button id="reg-btn-${e.id}"
                      class="btn btn-sm ${reg ? 'btn-outline-secondary' : isFull ? 'btn-outline-secondary' : 'btn-accent'} py-1 px-3"
                      ${isFull ? 'disabled' : `onclick="openRegModal(eventsCache[${e.id}])"`}>
                      ${reg ? 'Edit Registration' : isFull ? '&#9940; Event Full' : 'Register'}
                    </button>
                  </div>` : `<div class="text-muted small mt-1" style="font-size:.78rem;">This event has passed.</div>`}
                </div>
              </div>`;
          }).join('')}`;
      }

      document.getElementById('eventsList').innerHTML =
        renderGroup('Upcoming', upcoming) + renderGroup('Past Events', past);
    }

    // ── Quick-add student ──────────────────────────────────────────────────────

    function toggleAddStudentForm() {
      const form = document.getElementById('quickAddStudentForm');
      form.classList.toggle('d-none');
      if (!form.classList.contains('d-none')) document.getElementById('qsName').focus();
    }

    async function quickSaveStudent() {
      const token   = localStorage.getItem('token');
      const name    = document.getElementById('qsName').value.trim();
      const alertEl = document.getElementById('quickAddAlert');
      const saveBtn = document.getElementById('qsSaveBtn');
      if (!name) { alertEl.textContent = 'Name is required.'; alertEl.classList.remove('d-none'); return; }
      alertEl.classList.add('d-none');
      saveBtn.disabled = true; saveBtn.innerHTML = '…';
      try {
        const res = await fetch(`${API}/students`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({
            name,
            date_of_birth: document.getElementById('qsDob').value || null,
            gender: document.getElementById('qsGender').value || null,
          }),
        });
        let data = {}; try { data = await res.json(); } catch {}
        if (res.ok) {
          // Add to local list and re-render the table with new student pre-selected
          myStudents.push(data);
          const currentSelected = getSelectedStudentIds();
          currentSelected.push(data.id);
          renderStudentTable(currentSelected);
          // Clear form and hide
          document.getElementById('qsName').value = '';
          document.getElementById('qsDob').value  = '';
          document.getElementById('qsGender').value = '';
          document.getElementById('quickAddStudentForm').classList.add('d-none');
        } else { alertEl.textContent = data.detail || `Error ${res.status}`; alertEl.classList.remove('d-none'); }
      } catch { alertEl.textContent = 'Something went wrong.'; alertEl.classList.remove('d-none'); }
      finally { saveBtn.disabled = false; saveBtn.textContent = 'Add'; }
    }

    // ── Helpers ────────────────────────────────────────────────────────────────

    function fmtDob(iso) {
      if (!iso) return '—';
      const [y, m, d] = iso.split('-');
      return `${m}/${d}/${y}`;
    }

    function fmtPrice(val) {
      return val != null ? `$${parseFloat(val).toFixed(2)}` : null;
    }

    function capacityBadge(e) {
      if (!e.max_students) return '';
      const cnt = e.registered_count || 0;
      const max = e.max_students;
      const pct = Math.min(100, Math.round(cnt / max * 100));
      const barColor = pct >= 100 ? '#ff5555' : pct >= 80 ? '#ff9900' : '#E3FC02';
      const isFull = pct >= 100;
      const labelClass = isFull ? 'cap-label full-lbl' : 'cap-label';
      const labelText  = isFull ? '&#9940; Event Full' : `${cnt} / ${max} students registered`;
      return `
        <div style="margin-top:.6rem;">
          <div class="${labelClass}"><span>${labelText}</span></div>
          <div class="cap-bar-wrap">
            <div class="cap-bar" style="width:${pct}%;background:${barColor};"></div>
          </div>
        </div>`;
    }

    function pricingBadge(e) {
      if (!e.regular_price && !e.early_price) return '';
      const now = new Date();
      const earlyActive = e.early_price && e.early_price_deadline && new Date(e.early_price_deadline) > now;
      if (earlyActive) {
        const deadline = new Date(e.early_price_deadline).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        return `<div class="event-meta mt-1">
          <span style="color:#E3FC02;font-weight:600;">&#128176; ${fmtPrice(e.early_price)} early bird</span>
          <span class="ms-2">/ ${fmtPrice(e.regular_price)} after ${deadline}</span>
        </div>`;
      }
      if (e.regular_price) {
        return `<div class="event-meta mt-1"><span style="color:#E3FC02;font-weight:600;">&#128176; ${fmtPrice(e.regular_price)} per student</span></div>`;
      }
      return '';
    }

    function calcRunningTotal(event) {
      if (!event) return null;
      const now = new Date();
      const earlyActive = event.early_price && event.early_price_deadline && new Date(event.early_price_deadline) > now;
      const pricePerStudent = earlyActive ? parseFloat(event.early_price) : (event.regular_price ? parseFloat(event.regular_price) : null);
      if (pricePerStudent == null) return null;
      const count = [...document.querySelectorAll('.stu-switch:checked')].length;
      return count * pricePerStudent;
    }

    function updateTotalDisplay(event) {
      const total = calcRunningTotal(event);
      const el = document.getElementById('regTotal');
      if (!el) return;
      if (total == null) { el.classList.add('d-none'); return; }
      el.classList.remove('d-none');
      el.innerHTML = `<span class="text-muted small">Estimated total: </span><strong style="color:#E3FC02;">$${total.toFixed(2)}</strong>`;
    }

    function getSelectedStudentIds() {
      return [...document.querySelectorAll('.stu-switch:checked')].map(i => parseInt(i.dataset.studentId));
    }

    function renderStudentTable(selectedIds) {
      const tbody = document.getElementById('studentTableBody');
      const wrap  = document.getElementById('studentTableWrap');
      const noMsg = document.getElementById('noStudentsMsg');

      if (myStudents.length === 0) {
        wrap.classList.add('d-none');
        noMsg.classList.remove('d-none');
        updateTotalDisplay(currentRegEvent);
        return;
      }

      noMsg.classList.add('d-none');
      wrap.classList.remove('d-none');
      tbody.innerHTML = myStudents.map(s => `
        <tr onclick="document.getElementById('sw-${s.id}').click()">
          <td>
            <div class="form-check form-switch mb-0 ms-1">
              <input class="form-check-input stu-switch" type="checkbox" role="switch"
                id="sw-${s.id}" data-student-id="${s.id}"
                ${selectedIds.includes(s.id) ? 'checked' : ''}
                onclick="event.stopPropagation()">
            </div>
          </td>
          <td class="fw-semibold" style="color:#f0f0f0;">${esc(s.name)}</td>
          <td>${fmtDob(s.date_of_birth)}</td>
          <td>${esc(s.gender || '—')}</td>
        </tr>`).join('');

      // Attach change listeners for running total
      tbody.querySelectorAll('.stu-switch').forEach(sw => {
        sw.addEventListener('change', () => updateTotalDisplay(currentRegEvent));
      });
      updateTotalDisplay(currentRegEvent);
    }

    // ── Registration modal ─────────────────────────────────────────────────────

    function openRegModal(event) {
      currentRegEvent = event;
      document.getElementById('regEventId').value = event.id;
      document.getElementById('regModalTitle').textContent = event.title;
      document.getElementById('regAlert').classList.add('d-none');
      document.getElementById('quickAddStudentForm').classList.add('d-none');

      const reg = myRegistrations[String(event.id)];
      const selectedIds = reg ? reg.student_ids : [];

      renderStudentTable(selectedIds);

      const unregBtn = document.getElementById('unregBtn');
      const saveBtn  = document.getElementById('regSaveBtn');
      unregBtn.style.display = reg ? 'inline-block' : 'none';
      saveBtn.textContent    = reg ? 'Update Registration' : 'Register';
      regModal.show();
    }

    async function saveRegistration() {
      const token      = localStorage.getItem('token');
      const eventId    = document.getElementById('regEventId').value;
      const alertEl    = document.getElementById('regAlert');
      const saveBtn    = document.getElementById('regSaveBtn');
      const studentIds = getSelectedStudentIds();

      alertEl.classList.add('d-none');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Saving…';

      try {
        const res = await fetch(`${API}/events/${eventId}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ student_ids: studentIds }),
        });
        if (res.ok) {
          const data = await res.json();
          myRegistrations[String(eventId)] = { registration_id: data.id, student_ids: data.student_ids };
          updateEventCard(eventId, true);
          regModal.hide();
        } else {
          const data = await res.json().catch(() => ({}));
          alertEl.textContent = data.detail || `Error ${res.status}`;
          alertEl.classList.remove('d-none');
        }
      } catch {
        alertEl.textContent = 'Something went wrong. Please try again.';
        alertEl.classList.remove('d-none');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = myRegistrations[String(eventId)] ? 'Update Registration' : 'Register';
      }
    }

    async function unregisterFromEvent() {
      const token   = localStorage.getItem('token');
      const eventId = document.getElementById('regEventId').value;
      if (!confirm('Cancel your registration for this event?')) return;
      try {
        const res = await fetch(`${API}/events/${eventId}/register`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        if (res.ok) { delete myRegistrations[String(eventId)]; updateEventCard(eventId, false); regModal.hide(); }
        else alert('Failed to cancel registration.');
      } catch { alert('Something went wrong.'); }
    }

    function updateEventCard(eventId, isRegistered) {
      const card = document.getElementById(`ecard-${eventId}`);
      const btn  = document.getElementById(`reg-btn-${eventId}`);
      if (card) { if (isRegistered) card.classList.add('registered'); else card.classList.remove('registered'); }
      if (btn) {
        if (isRegistered) {
          btn.className = 'btn btn-sm btn-outline-secondary py-1 px-3';
          btn.textContent = 'Edit Registration';
          const parent = btn.parentElement;
          if (!parent.querySelector('.reg-badge')) {
            const badge = document.createElement('span');
            badge.className = 'reg-badge';
            badge.innerHTML = '&#10003; Registered';
            parent.insertBefore(badge, btn);
          }
        } else {
          btn.className = 'btn btn-sm btn-accent py-1 px-3';
          btn.textContent = 'Register';
          const badge = btn.parentElement.querySelector('.reg-badge');
          if (badge) badge.remove();
        }
      }
    }

    (async () => {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = 'login.html'; return; }
      regModal = new bootstrap.Modal(document.getElementById('regModal'));
      try {
        const [userRes, studRes, evtRes, regRes] = await Promise.all([
          fetch(`${API}/auth/me`,               { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API}/students`,               { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API}/events`),
          fetch(`${API}/events/my-registrations`,{ headers: { 'Authorization': `Bearer ${token}` } }),
        ]);

        if (userRes.status === 401) { localStorage.removeItem('token'); window.location.href = 'login.html'; return; }
        const user = await userRes.json();
        const firstName = user.first_name || '';
        document.getElementById('sidebarAvatar').textContent = (firstName || user.email).charAt(0).toUpperCase();
        document.getElementById('sidebarName').textContent   = firstName ? `${firstName} ${user.last_name||''}`.trim() : user.email;
        document.getElementById('sidebarStudio').textContent = user.studio_name || '';
        if (user.is_admin) document.getElementById('adminLink').style.display = '';

        myStudents      = studRes.ok ? await studRes.json() : [];
        const events    = evtRes.ok  ? await evtRes.json()  : [];
        myRegistrations = regRes.ok  ? await regRes.json()  : {};
        renderEvents(events);
      } catch {
        document.getElementById('spinner').classList.add('d-none');
        document.getElementById('errorMsg').textContent = 'Failed to load events. Please try again.';
        document.getElementById('errorMsg').classList.remove('d-none');
      }
    })();
  </script>
</body>
</html>
