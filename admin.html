<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — RadiatePro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #000; color: #f0f0f0; }
    .navbar { background-color: #000 !important; border-bottom: 2px solid #E3FC02; }
    .brand-link { color: #E3FC02 !important; text-decoration: none; }
    .btn-accent { background-color: #E3FC02; color: #000; font-weight: 700; border: none; }
    .btn-accent:hover { background-color: #cce500; color: #000; }
    .table { --bs-table-bg: transparent; --bs-table-color: #f0f0f0;
             --bs-table-border-color: #2a2a2a; --bs-table-striped-bg: #111;
             --bs-table-hover-bg: #1a1a1a; }
    thead th { color: #E3FC02; border-bottom-color: #E3FC02 !important; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; }
    .badge-admin { background-color: #E3FC02; color: #000; font-weight: 700; }
    .badge-user  { background-color: #2a2a2a; color: #aaa; }
    .badge-verified   { background-color: #198754; }
    .badge-unverified { background-color: #6c757d; }
    .badge-convention  { background-color: #0d6efd; color: #fff; }
    .badge-competition { background-color: #fd7e14; color: #000; }
    .page-title { color: #E3FC02; }
    .stat-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; }
    .stat-number { color: #E3FC02; font-size: 2rem; font-weight: 700; }
    #loadingSpinner { color: #E3FC02; }
    .admin-banner {
      background: linear-gradient(90deg, #E3FC02 0%, #c8e000 100%);
      color: #000; font-weight: 700; font-size: .8rem;
      letter-spacing: .08em; text-transform: uppercase;
      text-align: center; padding: .45rem 1rem;
    }
    .modal-content { background: #1a1a1a; border: 1px solid #2a2a2a; color: #f0f0f0; }
    .modal-header { border-bottom-color: #2a2a2a; }
    .modal-footer { border-top-color: #2a2a2a; }
    .modal-title { color: #E3FC02; }
    .form-label { color: #ccc; }
    .form-control, .form-select { background: #111; border-color: #333; color: #f0f0f0; }
    .form-control:focus, .form-select:focus { background: #111; border-color: #E3FC02; color: #f0f0f0; box-shadow: 0 0 0 .2rem rgba(227,252,2,.2); }
    .form-select option { background: #111; }
    .btn-close { filter: invert(1); }
    .date-muted { color: #666; font-size: .78rem; }
    /* Tabs */
    .nav-tabs { border-bottom: 1px solid #2a2a2a !important; }
    .nav-tabs .nav-link { color: #888; border: none; border-bottom: 2px solid transparent; border-radius: 0; padding: .6rem 1.2rem; }
    .nav-tabs .nav-link:hover { color: #E3FC02; border-color: transparent; }
    .nav-tabs .nav-link.active { color: #E3FC02; background: transparent; border-bottom: 2px solid #E3FC02; }
  </style>
</head>
<body>

  <!-- Admin banner -->
  <div class="admin-banner">&#9679; Admin Portal &mdash; Restricted Access &#9679;</div>

  <!-- Navbar -->
  <nav class="navbar navbar-dark px-4 py-3">
    <a href="index.html" class="brand-link fw-bold fs-5">RadiatePro</a>
    <div class="d-flex align-items-center gap-3">
      <span class="badge badge-admin px-2 py-1">ADMIN</span>
      <a href="dashboard.html" class="text-muted text-decoration-none small">Dashboard</a>
      <button class="btn btn-sm btn-outline-secondary" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="container py-4">

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-4" id="adminTabs">
      <li class="nav-item">
        <button class="nav-link active" id="users-tab" data-bs-toggle="tab" data-bs-target="#usersPane" type="button">
          Users
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="events-tab" data-bs-toggle="tab" data-bs-target="#eventsPane" type="button">
          Events
        </button>
      </li>
    </ul>

    <div class="tab-content">

      <!-- ── Users Tab ──────────────────────────────────────────────────────── -->
      <div class="tab-pane fade show active" id="usersPane">

        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="fw-bold page-title mb-0">User Management</h4>
          <button class="btn btn-accent btn-sm" onclick="loadUsers()">&#8635; Refresh</button>
        </div>

        <!-- Stats row -->
        <div class="row g-3 mb-4">
          <div class="col-6 col-md-3">
            <div class="stat-card p-3 text-center">
              <div class="stat-number" id="statTotal">—</div>
              <div class="text-muted small">Total Users</div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card p-3 text-center">
              <div class="stat-number" id="statVerified">—</div>
              <div class="text-muted small">Verified</div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card p-3 text-center">
              <div class="stat-number" id="statUnverified">—</div>
              <div class="text-muted small">Unverified</div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card p-3 text-center">
              <div class="stat-number" id="statAdmins">—</div>
              <div class="text-muted small">Admins</div>
            </div>
          </div>
        </div>

        <div id="loadingSpinner" class="text-center py-5">
          <div class="spinner-border" role="status"><span class="visually-hidden">Loading…</span></div>
        </div>
        <div id="errorMsg" class="alert alert-danger d-none"></div>

        <div id="tableWrapper" class="d-none">
          <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
              <thead>
                <tr>
                  <th>ID</th><th>Name</th><th>Email</th><th>Studio</th><th>Phone</th>
                  <th>Registered</th><th>Verified</th><th>Role</th><th></th>
                </tr>
              </thead>
              <tbody id="userTableBody"></tbody>
            </table>
          </div>
        </div>

      </div><!-- /usersPane -->

      <!-- ── Events Tab ─────────────────────────────────────────────────────── -->
      <div class="tab-pane fade" id="eventsPane">

        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="fw-bold page-title mb-0">Events</h4>
          <button class="btn btn-accent btn-sm" onclick="openAddEvent()">+ New Event</button>
        </div>

        <div id="eventsLoading" class="text-center py-3">
          <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
        </div>
        <div id="eventsEmpty" class="text-muted text-center py-3 d-none">No events yet.</div>
        <div id="eventsError" class="alert alert-danger d-none"></div>
        <div id="eventsList"></div>

      </div><!-- /eventsPane -->

    </div><!-- /tab-content -->
  </div><!-- /container -->

  <!-- ── Edit User Modal ────────────────────────────────────────────────────── -->
  <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editModalLabel">Edit User</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="editAlert" class="alert alert-danger d-none mb-3"></div>
          <form id="editForm" novalidate>
            <input type="hidden" id="editUserId">
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label fw-semibold">First Name</label>
                <input type="text" class="form-control" id="editFirstName">
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Last Name</label>
                <input type="text" class="form-control" id="editLastName">
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Studio Name</label>
                <input type="text" class="form-control" id="editStudio">
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Phone</label>
                <input type="tel" class="form-control" id="editPhone">
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control" id="editEmail">
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-accent" id="editSaveBtn" onclick="saveUser()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Admin Edit Student Modal ───────────────────────────────────────────── -->
  <div class="modal fade" id="adminStudentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Student</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="adminStudentAlert" class="alert alert-danger d-none mb-3"></div>
          <input type="hidden" id="asUserId">
          <input type="hidden" id="asStudentId">
          <div class="mb-3">
            <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="asName">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Date of Birth</label>
            <input type="date" class="form-control" id="asDob">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Gender</label>
            <select class="form-select" id="asGender">
              <option value="">— Select —</option>
              <option value="Female">Female</option>
              <option value="Male">Male</option>
              <option value="Non-binary">Non-binary</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-accent" id="adminStudentSaveBtn" onclick="saveAdminStudent()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Event Modal ────────────────────────────────────────────────────────── -->
  <div class="modal fade" id="eventModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="eventModalTitle">New Event</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="eventAlert" class="alert alert-danger d-none mb-3"></div>
          <input type="hidden" id="eventId">
          <div class="mb-3">
            <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="eventTitle" placeholder="Event title">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Event Type</label>
            <select class="form-select" id="eventType">
              <option value="">— Select type —</option>
              <option value="convention">Convention</option>
              <option value="competition">Competition</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Date &amp; Time <span class="text-danger">*</span></label>
            <input type="datetime-local" class="form-control" id="eventDate">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Location</label>
            <input type="text" class="form-control" id="eventLocation" placeholder="Venue or address">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea class="form-control" id="eventDesc" rows="3" placeholder="Optional details…"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-accent" id="eventSaveBtn" onclick="saveEvent()">Save Event</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API = 'https://goldfish-app-fuu3t.ondigitalocean.app/radiatepro-backend';
    let editModal, adminStudentModal, eventModal;

    function logout() {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        + '<br><span class="date-muted">' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) + '</span>';
    }

    function esc(str) {
      return String(str || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ── Users ─────────────────────────────────────────────────────────────────

    async function loadUsers() {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = 'login.html?next=admin.html'; return; }

      document.getElementById('loadingSpinner').classList.remove('d-none');
      document.getElementById('tableWrapper').classList.add('d-none');
      document.getElementById('errorMsg').classList.add('d-none');

      try {
        const res = await fetch(`${API}/admin/users`, { headers: { 'Authorization': `Bearer ${token}` } });

        if (res.status === 401) { window.location.href = 'login.html?next=admin.html'; return; }
        if (res.status === 403) {
          document.getElementById('errorMsg').textContent = 'Access denied. Admin privileges required.';
          document.getElementById('errorMsg').classList.remove('d-none');
          document.getElementById('loadingSpinner').classList.add('d-none');
          return;
        }

        let users = [];
        try { users = await res.json(); } catch {}

        document.getElementById('statTotal').textContent      = users.length;
        document.getElementById('statVerified').textContent   = users.filter(u => u.email_verified).length;
        document.getElementById('statUnverified').textContent = users.filter(u => !u.email_verified).length;
        document.getElementById('statAdmins').textContent     = users.filter(u => u.is_admin).length;

        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = users.map(u => `
          <tr id="row-${u.id}">
            <td class="text-muted small">${u.id}</td>
            <td>
              <button class="btn btn-link p-0 text-start fw-semibold text-decoration-none"
                style="color:#f0f0f0;" onclick="toggleStudents(${u.id},'${esc(u.first_name||'')} ${esc(u.last_name||'')}','${esc(u.studio_name||'')}')">
                ${esc(u.first_name||'')} ${esc(u.last_name||'')}
                <span class="text-muted ms-1" style="font-size:.7rem;" id="arrow-${u.id}">▶</span>
              </button>
            </td>
            <td>${esc(u.email)}</td>
            <td>${esc(u.studio_name||'—')}</td>
            <td>${esc(u.phone||'—')}</td>
            <td>${fmtDate(u.created_at)}</td>
            <td><span class="badge ${u.email_verified?'badge-verified':'badge-unverified'}">${u.email_verified?'Verified':'Unverified'}</span></td>
            <td><span class="badge ${u.is_admin?'badge-admin':'badge-user'}">${u.is_admin?'Admin':'User'}</span></td>
            <td class="text-nowrap">
              <button class="btn btn-sm btn-outline-secondary py-0 px-2 me-1"
                onclick="openEdit(${u.id},'${esc(u.first_name||'')}','${esc(u.last_name||'')}','${esc(u.studio_name||'')}','${esc(u.phone||'')}','${esc(u.email)}')">Edit</button>
              ${u.is_admin ? '' : `<button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="deleteUser(${u.id},'${esc(u.email)}')">Delete</button>`}
            </td>
          </tr>
          <tr id="students-row-${u.id}" class="d-none">
            <td colspan="9" style="background:#0d0d0d;padding:0;">
              <div class="p-3" id="students-content-${u.id}">
                <div class="text-muted small text-center py-2">Loading students…</div>
              </div>
            </td>
          </tr>
        `).join('');

        document.getElementById('loadingSpinner').classList.add('d-none');
        document.getElementById('tableWrapper').classList.remove('d-none');

      } catch {
        document.getElementById('errorMsg').textContent = 'Failed to load users. Please try again.';
        document.getElementById('errorMsg').classList.remove('d-none');
        document.getElementById('loadingSpinner').classList.add('d-none');
      }
    }

    async function toggleStudents(userId, name, studio) {
      const row   = document.getElementById(`students-row-${userId}`);
      const arrow = document.getElementById(`arrow-${userId}`);
      const open  = !row.classList.contains('d-none');

      if (open) { row.classList.add('d-none'); arrow.textContent = '▶'; return; }

      row.classList.remove('d-none');
      arrow.textContent = '▼';

      const token = localStorage.getItem('token');
      const content = document.getElementById(`students-content-${userId}`);
      content.innerHTML = '<div class="text-muted small text-center py-2">Loading…</div>';

      try {
        const res = await fetch(`${API}/admin/users/${userId}/students`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const students = await res.json();

        if (!students.length) {
          content.innerHTML = `<p class="text-muted small mb-0">No students registered for <strong>${esc(name||studio)}</strong>.</p>`;
          return;
        }

        content.innerHTML = `
          <p class="text-muted small mb-2 fw-semibold" style="color:#E3FC02;">Students — ${esc(studio||name)}</p>
          <table class="table table-sm mb-0" style="--bs-table-bg:transparent;--bs-table-color:#ccc;--bs-table-border-color:#2a2a2a;font-size:.85rem;">
            <thead><tr style="color:#888;"><th>Name</th><th>Date of Birth</th><th>Gender</th><th></th></tr></thead>
            <tbody id="admin-students-${userId}">
              ${students.map(s => `
                <tr id="asr-${s.id}">
                  <td>${esc(s.name)}</td>
                  <td>${s.date_of_birth ? new Date(s.date_of_birth+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'}</td>
                  <td>${esc(s.gender||'—')}</td>
                  <td class="text-nowrap">
                    <button class="btn btn-sm btn-outline-secondary py-0 px-2 me-1"
                      onclick="openAdminEditStudent(${userId},${s.id},'${esc(s.name)}','${s.date_of_birth||''}','${esc(s.gender||'')}')">Edit</button>
                    <button class="btn btn-sm btn-outline-danger py-0 px-2"
                      onclick="adminDeleteStudent(${userId},${s.id},'${esc(s.name)}')">Remove</button>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>`;
      } catch {
        content.innerHTML = '<div class="text-danger small">Failed to load students.</div>';
      }
    }

    // ── Admin student edit ─────────────────────────────────────────────────────

    function openAdminEditStudent(userId, studentId, name, dob, gender) {
      document.getElementById('asUserId').value    = userId;
      document.getElementById('asStudentId').value = studentId;
      document.getElementById('asName').value      = name;
      document.getElementById('asDob').value       = dob;
      document.getElementById('asGender').value    = gender;
      document.getElementById('adminStudentAlert').classList.add('d-none');
      adminStudentModal.show();
    }

    async function saveAdminStudent() {
      const token     = localStorage.getItem('token');
      const userId    = document.getElementById('asUserId').value;
      const studentId = document.getElementById('asStudentId').value;
      const alertEl   = document.getElementById('adminStudentAlert');
      const saveBtn   = document.getElementById('adminStudentSaveBtn');
      const name      = document.getElementById('asName').value.trim();

      if (!name) {
        alertEl.textContent = 'Name is required.';
        alertEl.classList.remove('d-none'); return;
      }

      alertEl.classList.add('d-none');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Saving…';

      const body = {
        name,
        date_of_birth: document.getElementById('asDob').value || null,
        gender:        document.getElementById('asGender').value || null,
      };

      try {
        const res = await fetch(`${API}/admin/users/${userId}/students/${studentId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(body),
        });

        let data = {};
        try { data = await res.json(); } catch {}

        if (res.ok) {
          adminStudentModal.hide();
          // refresh the student row
          const row = document.getElementById(`asr-${studentId}`);
          if (row) {
            const dob = data.date_of_birth
              ? new Date(data.date_of_birth+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
              : '—';
            row.cells[0].textContent = data.name;
            row.cells[1].textContent = dob;
            row.cells[2].textContent = data.gender || '—';
          }
        } else {
          alertEl.textContent = data.detail || `Error ${res.status}`;
          alertEl.classList.remove('d-none');
        }
      } catch {
        alertEl.textContent = 'Something went wrong. Please try again.';
        alertEl.classList.remove('d-none');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save';
      }
    }

    async function adminDeleteStudent(userId, studentId, name) {
      if (!confirm(`Remove student "${name}"?`)) return;
      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`${API}/admin/users/${userId}/students/${studentId}`, {
          method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` },
        });
        if (res.ok) document.getElementById(`asr-${studentId}`).remove();
        else alert('Failed to remove student.');
      } catch { alert('Failed to remove student.'); }
    }

    // ── User edit / delete ─────────────────────────────────────────────────────

    function openEdit(id, firstName, lastName, studio, phone, email) {
      document.getElementById('editUserId').value    = id;
      document.getElementById('editFirstName').value = firstName;
      document.getElementById('editLastName').value  = lastName;
      document.getElementById('editStudio').value    = studio;
      document.getElementById('editPhone').value     = phone;
      document.getElementById('editEmail').value     = email;
      document.getElementById('editAlert').classList.add('d-none');
      document.getElementById('editModalLabel').textContent = `Edit User #${id}`;
      editModal.show();
    }

    async function saveUser() {
      const token   = localStorage.getItem('token');
      const userId  = document.getElementById('editUserId').value;
      const alertEl = document.getElementById('editAlert');
      const saveBtn = document.getElementById('editSaveBtn');

      alertEl.classList.add('d-none');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Saving…';

      const body = {
        first_name:  document.getElementById('editFirstName').value.trim() || null,
        last_name:   document.getElementById('editLastName').value.trim()  || null,
        studio_name: document.getElementById('editStudio').value.trim()    || null,
        phone:       document.getElementById('editPhone').value.trim()     || null,
        email:       document.getElementById('editEmail').value.trim()     || null,
      };

      try {
        const res = await fetch(`${API}/admin/users/${userId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(body),
        });

        let data = {};
        try { data = await res.json(); } catch {}

        if (res.ok) { editModal.hide(); loadUsers(); }
        else {
          alertEl.textContent = data.detail || `Error ${res.status}`;
          alertEl.classList.remove('d-none');
        }
      } catch {
        alertEl.textContent = 'Something went wrong. Please try again.';
        alertEl.classList.remove('d-none');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Changes';
      }
    }

    async function deleteUser(id, email) {
      if (!confirm(`Delete user "${email}"? This cannot be undone.`)) return;
      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`${API}/admin/users/${id}`, {
          method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` },
        });
        if (res.ok) {
          document.getElementById(`row-${id}`).remove();
          const total = document.getElementById('statTotal');
          total.textContent = parseInt(total.textContent) - 1;
        } else {
          let data = {}; try { data = await res.json(); } catch {}
          alert(data.detail || `Error ${res.status}`);
        }
      } catch { alert('Failed to delete user. Please try again.'); }
    }

    // ── Events ─────────────────────────────────────────────────────────────────

    function fmtDt(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
        + ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    }

    function toLocalInput(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const pad = n => String(n).padStart(2,'0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function typeBadge(type) {
      if (!type) return '';
      const cls = type === 'competition' ? 'badge-competition' : 'badge-convention';
      return `<span class="badge ${cls} me-2">${type.charAt(0).toUpperCase()+type.slice(1)}</span>`;
    }

    async function loadEvents() {
      try {
        const res = await fetch(`${API}/events`);
        let events = [];
        try { events = await res.json(); } catch {}
        document.getElementById('eventsLoading').classList.add('d-none');

        if (!events.length) { document.getElementById('eventsEmpty').classList.remove('d-none'); return; }

        document.getElementById('eventsList').innerHTML = events.map(e => `
          <div class="d-flex align-items-start justify-content-between p-3 mb-2"
               style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;" id="erow-${e.id}">
            <div>
              <div class="fw-bold">${typeBadge(e.event_type)}${esc(e.title)}</div>
              <div class="text-muted small">&#128337; ${fmtDt(e.event_date)}${e.location ? ' &nbsp;&#128205; '+esc(e.location) : ''}</div>
              ${e.description ? `<div class="text-muted small mt-1">${esc(e.description)}</div>` : ''}
            </div>
            <div class="d-flex gap-2 ms-3 flex-shrink-0">
              <button class="btn btn-sm btn-outline-secondary py-0 px-2"
                onclick="openEditEvent(${e.id},'${esc(e.title)}','${toLocalInput(e.event_date)}','${esc(e.location||'')}','${esc(e.description||'')}','${esc(e.event_type||'')}')">Edit</button>
              <button class="btn btn-sm btn-outline-danger py-0 px-2"
                onclick="deleteEvent(${e.id},'${esc(e.title)}')">Delete</button>
            </div>
          </div>`).join('');
      } catch {
        document.getElementById('eventsLoading').classList.add('d-none');
        document.getElementById('eventsError').textContent = 'Failed to load events.';
        document.getElementById('eventsError').classList.remove('d-none');
      }
    }

    function openAddEvent() {
      document.getElementById('eventModalTitle').textContent = 'New Event';
      document.getElementById('eventId').value       = '';
      document.getElementById('eventTitle').value    = '';
      document.getElementById('eventType').value     = '';
      document.getElementById('eventDate').value     = '';
      document.getElementById('eventLocation').value = '';
      document.getElementById('eventDesc').value     = '';
      document.getElementById('eventAlert').classList.add('d-none');
      eventModal.show();
    }

    function openEditEvent(id, title, date, location, desc, type) {
      document.getElementById('eventModalTitle').textContent = 'Edit Event';
      document.getElementById('eventId').value       = id;
      document.getElementById('eventTitle').value    = title;
      document.getElementById('eventType').value     = type;
      document.getElementById('eventDate').value     = date;
      document.getElementById('eventLocation').value = location;
      document.getElementById('eventDesc').value     = desc;
      document.getElementById('eventAlert').classList.add('d-none');
      eventModal.show();
    }

    async function saveEvent() {
      const token   = localStorage.getItem('token');
      const eventId = document.getElementById('eventId').value;
      const alertEl = document.getElementById('eventAlert');
      const saveBtn = document.getElementById('eventSaveBtn');
      const title   = document.getElementById('eventTitle').value.trim();
      const date    = document.getElementById('eventDate').value;

      if (!title || !date) {
        alertEl.textContent = 'Title and date are required.';
        alertEl.classList.remove('d-none'); return;
      }
      alertEl.classList.add('d-none');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Saving…';

      const body = {
        title,
        event_type:  document.getElementById('eventType').value     || null,
        event_date:  new Date(date).toISOString(),
        location:    document.getElementById('eventLocation').value.trim() || null,
        description: document.getElementById('eventDesc').value.trim()    || null,
      };

      const url    = eventId ? `${API}/admin/events/${eventId}` : `${API}/admin/events`;
      const method = eventId ? 'PATCH' : 'POST';

      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(body),
        });
        let data = {}; try { data = await res.json(); } catch {}

        if (res.ok) {
          eventModal.hide();
          document.getElementById('eventsList').innerHTML = '';
          document.getElementById('eventsEmpty').classList.add('d-none');
          document.getElementById('eventsLoading').classList.remove('d-none');
          loadEvents();
        } else {
          alertEl.textContent = data.detail || `Error ${res.status}`;
          alertEl.classList.remove('d-none');
        }
      } catch {
        alertEl.textContent = 'Something went wrong. Please try again.';
        alertEl.classList.remove('d-none');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Event';
      }
    }

    async function deleteEvent(id, title) {
      if (!confirm(`Delete event "${title}"?`)) return;
      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`${API}/admin/events/${id}`, {
          method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` },
        });
        if (res.ok) document.getElementById(`erow-${id}`).remove();
      } catch { alert('Failed to delete event.'); }
    }

    // ── Init ───────────────────────────────────────────────────────────────────

    (async () => {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = 'login.html?next=admin.html'; return; }
      editModal         = new bootstrap.Modal(document.getElementById('editModal'));
      adminStudentModal = new bootstrap.Modal(document.getElementById('adminStudentModal'));
      eventModal        = new bootstrap.Modal(document.getElementById('eventModal'));

      // Load Events tab content when it's shown for the first time
      let eventsLoaded = false;
      document.getElementById('events-tab').addEventListener('shown.bs.tab', () => {
        if (!eventsLoaded) { eventsLoaded = true; loadEvents(); }
      });

      loadUsers();
    })();
  </script>
</body>
</html>
